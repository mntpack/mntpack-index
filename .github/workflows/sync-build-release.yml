name: Sync Build Release

on:
  repository_dispatch:
    types: [mntpack_sync]
  workflow_dispatch:
    inputs:
      owner:
        description: GitHub repository owner
        required: true
        type: string
      repo:
        description: GitHub repository name
        required: true
        type: string
      version:
        description: Optional tag/commit for sync
        required: false
        type: string
      package_name:
        description: Optional package name override
        required: false
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x64
            ext: tar.xz
          - os: windows-latest
            target: windows-x64
            ext: zip
    steps:
      - name: Checkout index repo
        uses: actions/checkout@v4

      - name: Resolve payload
        id: payload
        shell: pwsh
        run: |
          $owner = "${{ github.event.client_payload.owner }}"
          if ([string]::IsNullOrWhiteSpace($owner)) { $owner = "${{ inputs.owner }}" }
          $repo = "${{ github.event.client_payload.repo }}"
          if ([string]::IsNullOrWhiteSpace($repo)) { $repo = "${{ inputs.repo }}" }
          if ([string]::IsNullOrWhiteSpace($owner) -or [string]::IsNullOrWhiteSpace($repo)) {
            throw "owner/repo must be provided"
          }

          $version = "${{ github.event.client_payload.requested_version }}"
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "${{ github.event.client_payload.resolved_version }}" }
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "${{ github.event.client_payload.commit }}" }
          if ([string]::IsNullOrWhiteSpace($version)) { $version = "${{ inputs.version }}" }

          $packageName = "${{ github.event.client_payload.package_name }}"
          if ([string]::IsNullOrWhiteSpace($packageName)) { $packageName = "${{ inputs.package_name }}" }
          if ([string]::IsNullOrWhiteSpace($packageName)) { $packageName = $repo }

          "owner=$owner" >> $env:GITHUB_OUTPUT
          "repo=$repo" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "package_name=$packageName" >> $env:GITHUB_OUTPUT

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout mntpack source
        uses: actions/checkout@v4
        with:
          repository: mntpack/mntpack
          path: mntpack-src

      - name: Build mntpack
        shell: pwsh
        run: |
          cargo build --release --manifest-path mntpack-src/Cargo.toml

      - name: Configure mntpack home
        shell: pwsh
        run: |
          $mntpackHome = Join-Path $env:RUNNER_TEMP ".mntpack"
          "MNTPACK_HOME=$mntpackHome" >> $env:GITHUB_ENV

      - name: Sync repository using mntpack
        id: sync
        env:
          OWNER: ${{ steps.payload.outputs.owner }}
          REPO: ${{ steps.payload.outputs.repo }}
          VERSION: ${{ steps.payload.outputs.version }}
          PACKAGE_NAME: ${{ steps.payload.outputs.package_name }}
        shell: pwsh
        run: |
          $exe = if ($env:RUNNER_OS -eq "Windows") { "mntpack.exe" } else { "mntpack" }
          $mntpack = Join-Path (Resolve-Path "mntpack-src/target/release") $exe
          if (-not (Test-Path $mntpack)) {
            throw "mntpack binary not found at $mntpack"
          }
          $repoSpec = "$env:OWNER/$env:REPO"
          if ([string]::IsNullOrWhiteSpace($env:VERSION)) {
            & $mntpack sync $repoSpec -n $env:PACKAGE_NAME
          } else {
            & $mntpack sync $repoSpec -n $env:PACKAGE_NAME -v $env:VERSION
          }
          if ($LASTEXITCODE -ne 0) {
            throw "mntpack sync failed with exit code $LASTEXITCODE"
          }

      - name: Package binary
        id: package
        env:
          OWNER: ${{ steps.payload.outputs.owner }}
          REPO: ${{ steps.payload.outputs.repo }}
          PACKAGE_NAME: ${{ steps.payload.outputs.package_name }}
          TARGET: ${{ matrix.target }}
          EXT: ${{ matrix.ext }}
        shell: pwsh
        run: |
          $installJson = $null
          $packageRoot = Join-Path $env:MNTPACK_HOME "packages"
          if (Test-Path $packageRoot) {
            foreach ($file in Get-ChildItem -Path $packageRoot -Filter install.json -Recurse -File) {
              $record = Get-Content -Raw $file.FullName | ConvertFrom-Json
              if ($record.owner -eq $env:OWNER -and $record.repo -eq $env:REPO) {
                $installJson = $file.FullName
                break
              }
            }
          }

          if ([string]::IsNullOrWhiteSpace($installJson)) {
            throw "failed to locate install metadata for $env:OWNER/$env:REPO"
          }

          $record = Get-Content -Raw $installJson | ConvertFrom-Json
          $binaryPath = "$($record.binaryPath)"
          if ([string]::IsNullOrWhiteSpace($binaryPath)) {
            $binaryHash = "$($record.binaryHash)"
            $binaryName = "$($record.binaryName)"
            if (-not [string]::IsNullOrWhiteSpace($binaryHash) -and -not [string]::IsNullOrWhiteSpace($binaryName)) {
              $cleanHash = $binaryHash -replace '^sha256:', ''
              $binaryPath = Join-Path $env:MNTPACK_HOME "store/sha256/$cleanHash/$binaryName"
            }
          }

          if ([string]::IsNullOrWhiteSpace($binaryPath) -or -not (Test-Path $binaryPath)) {
            throw "binary not found for $env:OWNER/$env:REPO (command-driven package or build pending)"
          }

          $ref = "$($record.commit)"
          if ([string]::IsNullOrWhiteSpace($ref)) { $ref = "$($record.version)" }
          if ([string]::IsNullOrWhiteSpace($ref)) { $ref = "latest" }
          $safeRef = ($ref -replace '[^A-Za-z0-9._-]', '-')
          $safeOwner = ($env:OWNER -replace '[^A-Za-z0-9._-]', '-')
          $safeRepo = ($env:REPO -replace '[^A-Za-z0-9._-]', '-')
          $tag = "$safeOwner-$safeRepo-$safeRef"
          $asset = "mntpack-$safeOwner-$safeRepo-$safeRef-$env:TARGET.$env:EXT"

          New-Item -ItemType Directory -Force -Path dist | Out-Null
          if ($env:RUNNER_OS -eq "Windows") {
            Compress-Archive -Path $binaryPath -DestinationPath (Join-Path dist $asset) -Force
          } else {
            $binDir = Split-Path -Parent $binaryPath
            $binName = Split-Path -Leaf $binaryPath
            tar -cJf (Join-Path dist $asset) -C $binDir $binName
          }
          Set-Content -Path (Join-Path dist "release-tag-${env:TARGET}.txt") -Value $tag -NoNewline

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sync-build-${{ matrix.target }}
          path: dist/*
          if-no-files-found: error

  release:
    name: publish-release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sync-build-*
          merge-multiple: true
          path: release-assets

      - name: Resolve release tag
        id: release_tag
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t TAGS < <(cat release-assets/release-tag-*.txt | sort -u)
          if [[ "${#TAGS[@]}" -eq 0 ]]; then
            echo "no release tag files found"
            exit 1
          fi
          if [[ "${#TAGS[@]}" -ne 1 ]]; then
            echo "mismatched release tags from matrix runs:"
            printf ' - %s\n' "${TAGS[@]}"
            exit 1
          fi
          echo "tag=${TAGS[0]}" >> "$GITHUB_OUTPUT"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          overwrite_files: true
          files: |
            release-assets/*.tar.xz
            release-assets/*.zip
